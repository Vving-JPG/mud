<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修仙纪元 - 江湖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="top-bar">
        <div class="top-left">
            <div class="avatar-small">道</div>
            <div class="player-info">
                <h3 id="player-name">陈平安</h3>
                <span id="player-level">炼气期 · 三层</span>
            </div>
        </div>
        <div class="top-right">
            <div class="resource-item">
                <div class="resource-icon">灵</div>
                <span id="player-mp">1,280</span>
            </div>
            <div class="resource-item">
                <div class="resource-icon" style="background: linear-gradient(135deg, #d4a84b, #b8941f);">金</div>
                <span id="player-gold">580</span>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 角色视图 -->
        <div id="view-character" class="game-view">
            <div class="character-header">
                <div class="character-avatar">道</div>
                <div class="character-name">陈平安</div>
                <div class="character-title">骊珠洞天 · 草鞋少年</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-name">臂力</span>
                    <span class="stat-value" id="stat-str">59</span>
                </div>
                <div class="stat-card">
                    <span class="stat-name">身法</span>
                    <span class="stat-value highlight" id="stat-dex">126</span>
                </div>
                <div class="stat-card">
                    <span class="stat-name">根骨</span>
                    <span class="stat-value" id="stat-vit">42</span>
                </div>
                <div class="stat-card">
                    <span class="stat-name">悟性</span>
                    <span class="stat-value highlight" id="stat-int">88</span>
                </div>
            </div>

            <div class="life-section">
                <div class="life-header">
                    <span class="life-label">寿元</span>
                    <span class="life-value" id="life-value">24 / 120 载</span>
                </div>
                <div class="life-bar-container">
                    <div class="life-bar-fill" id="life-bar" style="width: 20%;"></div>
                </div>
                <div class="life-phase" id="life-phase">当前阶段：壮年</div>
            </div>

            <div class="tags-section">
                <div class="tags-title">命格标签</div>
                <div class="tags-list" id="tags-list">
                    <span class="tag">小宗门杂役</span>
                    <span class="tag">坚毅不拔</span>
                    <span class="tag">草鞋少年</span>
                    <span class="tag">机缘浅薄</span>
                </div>
            </div>
        </div>

        <!-- 江湖视图（体素地图） -->
        <div id="view-map" class="game-view active">
            <div class="map-wrapper">
                <canvas id="map-canvas"></canvas>
                
                <!-- 楼层指示 -->
                <div class="floor-indicator" id="floor-indicator">洞天第 1 层</div>
                
                <!-- 小地图 -->
                <div class="minimap-container">
                    <canvas id="minimap-canvas"></canvas>
                </div>

                <!-- 战斗日志 -->
                <div class="combat-log" id="combat-log"></div>

                <!-- 地图信息 -->
                <div class="map-info">
                    <div class="location-name" id="location-name">古龙涧</div>
                    <div class="location-desc" id="location-desc">千年古桥横跨深涧，青苔遍布，山风萧瑟。你察觉到一丝丹药残香...</div>
                    <div class="location-coords" id="location-coords">坐标: (0, 0)</div>
                </div>

                <!-- 方向控制 -->
                <div class="d-pad">
                    <div class="d-btn" data-dir="up">▲</div>
                    <div class="d-btn" data-dir="left">◀</div>
                    <div class="d-btn" data-dir="wait">●</div>
                    <div class="d-btn" data-dir="right">▶</div>
                    <div class="d-btn" data-dir="down">▼</div>
                </div>
            </div>
        </div>

        <!-- 物品视图 -->
        <div id="view-items" class="game-view">
            <div class="sub-layout">
                <div class="side-tabs">
                    <div class="side-tab active" data-tab="medicine">药品</div>
                    <div class="side-tab" data-tab="food">食物</div>
                    <div class="side-tab" data-tab="material">材料</div>
                    <div class="side-tab" data-tab="magic">法器</div>
                </div>
                <div class="item-content">
                    <div class="item-grid" id="item-grid">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 技能视图 -->
        <div id="view-skills" class="game-view">
            <div class="placeholder-view">
                <div class="placeholder-icon">⚔️</div>
                <span>功法修炼 · 敬请期待</span>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item" data-view="character">
            <div class="nav-icon">👤</div>
            <span>查看</span>
        </div>
        <div class="nav-item active" data-view="map">
            <div class="nav-icon">🗺️</div>
            <span>江湖</span>
        </div>
        <div class="nav-item" data-view="items">
            <div class="nav-icon">🎒</div>
            <span>物品</span>
        </div>
        <div class="nav-item" data-view="skills">
            <div class="nav-icon">⚡</div>
            <span>技能</span>
        </div>
    </div>

    <!-- 游戏结束画面 -->
    <div id="gameover-screen" class="screen-overlay">
        <div class="overlay-content">
            <h2>身死道消</h2>
            <p>你的修仙之路到此结束</p>
            <button onclick="location.reload()">重新开始</button>
        </div>
    </div>

    <!-- 错误提示 -->
    <script>
    window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;z-index:99999;background:red;color:#fff;padding:10px;font-size:14px;max-width:100%;word-break:break-all;';
        div.textContent = 'JS ERROR: ' + e.message + ' (' + e.filename + ':' + e.lineno + ')';
        document.body.appendChild(div);
    });
    </script>

    <!-- 基础层 -->
    <script src="js/foundation/MathUtils.js"></script>
    <script src="js/foundation/EventBus.js"></script>
    <script src="js/foundation/Logger.js"></script>

    <!-- 核心层 -->
    <script src="js/core/GameConstants.js"></script>
    <script src="js/core/GameEnums.js"></script>
    <script src="js/core/MapData.js"></script>
    <script src="js/core/UnitData.js"></script>
    <script src="js/core/ItemData.js"></script>
    <script src="js/core/VoxelData.js"></script>
    <script src="js/core/GameStateMachine.js"></script>
    <script src="js/core/CombatCalculator.js"></script>
    <script src="js/core/WorldGenerator.js"></script>

    <!-- 功能层 -->
    <script src="js/feature/ActorSystem.js"></script>
    <script src="js/feature/CombatSystem.js"></script>
    <script src="js/feature/TurnSystem.js"></script>
    <script src="js/feature/VoxelSystem.js"></script>
    <script src="js/feature/ItemSystem.js"></script>
    <script src="js/feature/SkillSystem.js"></script>

    <!-- 表现层 -->
    <script src="js/presentation/MapRenderer.js"></script>
    <script src="js/presentation/InputHandler.js"></script>
    <script src="js/presentation/CombatLog.js"></script>
    <script src="js/presentation/HUD.js"></script>
    <script src="js/presentation/ItemGrid.js"></script>
    <script src="js/presentation/InventoryUI.js"></script>
    <script src="js/presentation/LocationInfo.js"></script>
    <script src="js/presentation/MessageLog.js"></script>
    <script src="js/presentation/NarrativeRenderer.js"></script>
    <script src="js/presentation/StatusPanel.js"></script>

    <!-- 游戏主入口 -->
    <script src="js/main.js"></script>
</body>
</html>
